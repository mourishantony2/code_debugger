version: "3.9"

services:
  web:
    build: .
    container_name: debug_event_app
    ports:
      - "5000:5000"
    environment:
      # Set your MongoDB Atlas URI here or in a .env file
      - MONGODB_URI=${MONGODB_URI}
      - SECRET_KEY=${SECRET_KEY:-debug-event-secret-change-in-prod}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
