{% extends "base.html" %}
{% block title %}Admin Login — Debug Code Event{% endblock %}

{% block body %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">⚙</span>
      <h1 class="auth-title">Admin Portal</h1>
      <p class="auth-subtitle">Debug Code Event Platform</p>
    </div>

    <form method="POST" action="{{ url_for('admin.login') }}" class="auth-form" autocomplete="off">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-input"
          placeholder="Enter admin username"
          required
          autofocus
        />
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="Enter password"
          required
        />
      </div>
      <button type="submit" class="btn btn--primary btn--full" id="admin-login-btn">
        Login
      </button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('auth.register') }}" class="link-muted">← Back to Participant Portal</a>
    </div>
  </div>
</div>
{% endblock %}
